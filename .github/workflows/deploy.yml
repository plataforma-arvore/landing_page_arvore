name: Deploy

on:
  push:
    branches:
      - main  # ou a branch que quiser

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Debug chave SSH
        run: |
          echo "--- Primeiros caracteres da chave ---"
          head -1 ~/.ssh/id_rsa
          echo "--- Últimos caracteres da chave ---"
          tail -1 ~/.ssh/id_rsa
          echo "--- Verificando formato ---"
          ssh-keygen -l -f ~/.ssh/id_rsa || echo "CHAVE INVÁLIDA"

      - name: Configurar chave SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avzr --delete \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            ./ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.REMOTE_DIR }}